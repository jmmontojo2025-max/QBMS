{% extends "base.html" %}

{% block content %}
<!-- Premium SaaS Font -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<style>
    :root {
        --saas-navy: #0f172a;
        --saas-success: #10b981;
        --saas-slate: #64748b;
        --saas-border: #e2e8f0;
        --saas-radius: 16px;
    }

    body {
        background-color: #ffffff !important;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--saas-navy);
        -webkit-font-smoothing: antialiased;
    }

    .auth-viewport {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    /* THE OUTSIDE LINE (BOX CONTAINER) */
    .reset-container-box {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border: 1px solid var(--saas-border);
        border-radius: var(--saas-radius);
        padding: 3.5rem 2.5rem;
        transition: all 0.3s ease;
    }

    /* BRAND ICON */
    .brand-mark {
        width: 48px;
        height: 48px;
        background: var(--saas-success);
        color: #ffffff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        margin-bottom: 2rem;
        box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
    }

    .page-title {
        font-weight: 800;
        font-size: 1.8rem;
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
    }

    .page-subtitle {
        color: var(--saas-slate);
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 3rem;
        line-height: 1.5;
    }

    /* MODERN TEXTBOX UI */
    .field-wrapper {
        margin-bottom: 1.5rem;
    }

    .biz-label {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--saas-slate);
        margin-bottom: 0.8rem;
        display: block;
    }

    .modern-textbox {
        display: flex;
        align-items: center;
        background: #f8fafc;
        border: 1.5px solid var(--saas-border);
        border-radius: 12px;
        padding: 0.8rem 1.1rem;
        transition: all 0.2s ease;
    }

    .modern-textbox:focus-within {
        background: #ffffff;
        border-color: var(--saas-success);
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.05);
    }

    .modern-textbox i {
        color: #94a3b8;
        margin-right: 12px;
        font-size: 0.9rem;
    }

    .modern-textbox input {
        border: none;
        background: transparent !important;
        width: 100%;
        font-weight: 700;
        color: var(--saas-navy);
        font-size: 0.95rem;
    }

    .modern-textbox input:focus {
        outline: none;
    }

    /* ACTION BUTTON (PILL) */
    .btn-reset-cta {
        background: var(--saas-navy);
        color: #ffffff;
        width: 100%;
        padding: 1.1rem;
        border-radius: 50px;
        font-weight: 800;
        border: none;
        margin-top: 1.5rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.85rem;
    }

    .btn-reset-cta:hover {
        background: var(--saas-success);
        transform: translateY(-2px);
    }

    .security-note {
        margin-top: 2rem;
        font-size: 0.7rem;
        color: var(--saas-slate);
        text-align: center;
        line-height: 1.4;
    }

    @media (max-width: 576px) {
        .reset-container-box {
            padding: 2.5rem 1.5rem;
            border: none;
        }
    }
</style>

<div class="auth-viewport">

    <div class="reset-container-box animate__animated animate__fadeIn">

        <!-- ICON -->
        <div class="brand-mark shadow-sm">
            <i class="fa-solid fa-shield-check"></i>
        </div>

        <h1 class="page-title">Secure Update</h1>
        <p class="page-subtitle">Please initialize your new account access key below.</p>

        <!-- RESET FORM -->
        <form action="/reset-password/{{ token }}" method="POST" id="resetForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field-wrapper">
                <label class="biz-label">New Access Password</label>
                <div class="modern-textbox">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" id="pass1" placeholder="••••••••" required autofocus>
                </div>
            </div>

            <div class="field-wrapper">
                <label class="biz-label">Verify New Password</label>
                <div class="modern-textbox">
                    <i class="fa-solid fa-circle-check"></i>
                    <input type="password" id="pass2" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-reset-cta shadow-sm" id="submitBtn">
                Confirm Update
            </button>

            <div class="security-note">
                <i class="fa-solid fa-circle-info me-1"></i>
                Password must be at least 8 characters and include numeric identifiers.
            </div>
        </form>

    </div>

</div>

<script>
    const form = document.getElementById('resetForm');
    const p1 = document.getElementById('pass1');
    const p2 = document.getElementById('pass2');
    const btn = document.getElementById('submitBtn');

    form.onsubmit = function(e) {
        if(p1.value !== p2.value) {
            alert("Protocol Error: Access keys do not match. Please verify entry.");
            e.preventDefault();
            return;
        }

        // UI Feedback
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> UPDATING PROTOCOLS...';
        btn.classList.add('disabled');
    };
</script>
{% endblock %}
