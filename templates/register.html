{% extends "base.html" %}

{% block content %}
<!-- Premium SaaS Font -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<style>
    :root {
        --saas-navy: #0f172a;
        --saas-blue: #2563eb;
        --saas-slate: #64748b;
        --saas-border: #e2e8f0;
        --saas-radius: 16px;
    }

    body {
        background-color: #ffffff !important;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--saas-navy);
        -webkit-font-smoothing: antialiased;
    }

    .enroll-viewport {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    /* THE OUTSIDE LINE (BOX CONTAINER) */
    .enroll-container-box {
        width: 100%;
        max-width: 800px; /* Wider for dual-column desktop layout */
        background: #ffffff;
        border: 1px solid var(--saas-border);
        border-radius: var(--saas-radius);
        padding: 3rem;
        transition: all 0.3s ease;
    }

    .brand-mark {
        width: 48px; height: 48px;
        background: var(--saas-navy);
        color: #ffffff;
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.3rem;
        margin-bottom: 1.5rem;
    }

    .page-title {
        font-weight: 800;
        font-size: 1.8rem;
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
    }

    .page-subtitle {
        color: var(--saas-slate);
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 3rem;
    }

    /* SECTION DIVIDERS */
    .form-section-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 2rem;
        margin-top: 1rem;
    }

    .section-title {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--saas-blue);
        white-space: nowrap;
    }

    .section-line {
        height: 1px;
        width: 100%;
        background: var(--saas-border);
    }

    /* MODERN TEXTBOX UI */
    .biz-label {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--saas-slate);
        margin-bottom: 0.6rem;
        display: block;
    }

    .modern-textbox {
        display: flex;
        align-items: center;
        background: #f8fafc;
        border: 1.5px solid var(--saas-border);
        border-radius: 10px;
        padding: 0.7rem 1rem;
        transition: all 0.2s ease;
        margin-bottom: 1.25rem;
    }

    .modern-textbox:focus-within {
        background: #ffffff;
        border-color: var(--saas-navy);
        box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
    }

    .modern-textbox i {
        color: #94a3b8;
        margin-right: 12px;
        font-size: 0.9rem;
    }

    .modern-textbox input {
        border: none;
        background: transparent !important;
        width: 100%;
        font-weight: 700;
        color: var(--saas-navy);
        font-size: 0.9rem;
    }

    .modern-textbox input:focus { outline: none; }

    /* ACTION BUTTON */
    .btn-enroll-cta {
        background: var(--saas-navy);
        color: #ffffff;
        width: 100%;
        padding: 1.1rem;
        border-radius: 50px;
        font-weight: 800;
        border: none;
        margin-top: 2rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.85rem;
    }

    .btn-enroll-cta:hover {
        background: var(--saas-blue);
        transform: translateY(-2px);
    }

    .login-link {
        color: var(--saas-navy);
        text-decoration: none;
        font-weight: 800;
        transition: color 0.2s;
    }
    .login-link:hover { color: var(--saas-blue); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
        .enroll-container-box { padding: 2.5rem 1.5rem; border: none; }
        .page-title { font-size: 1.5rem; }
    }
</style>

<div class="enroll-viewport">

    <div class="enroll-container-box animate__animated animate__fadeIn">

        <div class="brand-mark shadow-sm">
            <i class="fa-solid fa-id-card"></i>
        </div>

        <h1 class="page-title">Identity Enrollment</h1>
        <p class="page-subtitle">Provide your business credentials to request portal access.</p>

        <form action="/register" method="POST" id="registerForm" autocomplete="off">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- SECTION 1: BUSINESS -->
            <div class="form-section-header">
                <span class="section-title">Business Validation</span>
                <div class="section-line"></div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <label class="biz-label">Legal Organization Name</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-building"></i>
                        <input type="text" name="company_name" placeholder="Full Registered Name" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="biz-label">Business TIN</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-hashtag"></i>
                        <input type="text" name="tin_number" placeholder="000-000-000" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="biz-label">Permit / Accreditation</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-file-contract"></i>
                        <input type="text" name="business_permit" placeholder="ID Number" required>
                    </div>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-12">
                    <label class="biz-label">Authorized Personnel</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-user-tie"></i>
                        <input type="text" name="full_name" placeholder="Full Legal Name" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="biz-label">Corporate Email</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" placeholder="name@company.com" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="biz-label">Mobile Number</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" name="phone" placeholder="0917-000-0000" required>
                    </div>
                </div>
            </div>

            <!-- SECTION 2: ACCESS -->
            <div class="form-section-header mt-4">
                <span class="section-title">Portal Credentials</span>
                <div class="section-line"></div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label class="biz-label">Desired Username</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-at"></i>
                        <input type="text" name="username" placeholder="Choose identifier" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="biz-label">Access Password</label>
                    <div class="modern-textbox">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" id="regPassword" placeholder="••••••••" required>
                        <button type="button" class="btn btn-link p-0 text-muted" onclick="toggleRegPass()">
                            <i class="fa-solid fa-eye-slash small" id="regIcon"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-enroll-cta shadow-sm" id="regSubmitBtn">
                Request Access Credentials
            </button>

            <div class="text-center mt-4">
                <p class="small text-muted fw-bold">
                    Already a registered partner?
                    <a href="/login" class="login-link ms-1">Sign In here</a>
                </p>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleRegPass() {
        const pInput = document.getElementById('regPassword');
        const icon = document.getElementById('regIcon');
        if (pInput.type === 'password') {
            pInput.type = 'text';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            pInput.type = 'password';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    }

    document.getElementById('registerForm').addEventListener('submit', function() {
        const btn = document.getElementById('regSubmitBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> PROCESSING ENROLLMENT...';
        btn.classList.add('disabled');
    });
</script>
{% endblock %}
