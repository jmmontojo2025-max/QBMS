{% extends "base.html" %}
{% block content %}

<!-- EXTERNAL ASSETS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
    :root {
        --fleet-navy: #0f172a;
        --fleet-primary: #2563eb;
        --fleet-success: #10b981;
        --fleet-warning: #f59e0b;
        --fleet-border: #e2e8f0;
        --fleet-bg: #ffffff; /* Forced pure white background */
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--fleet-bg); }

    .booking-terminal-wrapper { min-height: 100vh; padding: 1rem 0; }

    /* Main Card Styling - Removed shadows for cleaner white look */
    .main-booking-card {
        border: 1px solid var(--fleet-border);
        background: white;
    }

    /* Manifest Section */
    #manifestWrapper {
        background: #f8fafc;
        border-radius: 1rem;
        padding: 1rem;
        margin-bottom: 2rem;
        border: 1px solid var(--fleet-border);
    }

    /* RESPONSIVE TABLE LOGIC */
    .manifest-table-container { background: white; border-radius: 12px; border: 1px solid var(--fleet-border); }

    @media (max-width: 768px) {
        .manifest-table { display: none; } /* Hide table on mobile */
        .manifest-cards { display: block !important; } /* Show cards on mobile */
    }

    .manifest-card-item {
        background: white;
        border: 1px solid var(--fleet-border);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 0.75rem;
    }

    /* Input Styling - Mobile optimized */
    .biz-label {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        color: #64748b;
        letter-spacing: 0.5px;
        margin-bottom: 0.5rem;
        display: block;
    }

    .biz-input-group {
        display: flex;
        align-items: center;
        background: #f8fafc;
        border: 1.5px solid var(--fleet-border);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        transition: all 0.2s;
    }

    .biz-input-group:focus-within {
        border-color: var(--fleet-primary);
        background: white;
    }

    .biz-select, .biz-input {
        border: none !important;
        background: transparent !important;
        box-shadow: none !important;
        font-weight: 700;
        color: var(--fleet-navy);
        font-size: 1rem !important; /* Prevents iOS zoom */
    }

    /* Step Indicators */
    .step-hex {
        background: var(--fleet-navy);
        color: white;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-weight: 900;
        font-size: 0.75rem;
    }

    .btn-add-manifest {
        background: var(--fleet-navy);
        color: white;
        font-weight: 800;
        border-radius: 12px;
        padding: 1.2rem;
        border: none;
        width: 100%;
        transition: 0.3s;
    }

    .radar-ping {
        position: absolute; inset: 0;
        border: 2px solid var(--fleet-primary);
        border-radius: 1rem;
        animation: radar-expand 2s infinite;
    }
    @keyframes radar-expand { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }

    /* Custom Scrollbar for Manifest */
    #manifestBody { max-height: 400px; overflow-y: auto; }
</style>

<div class="booking-terminal-wrapper animate__animated animate__fadeIn">
    <div class="container-fluid px-3 px-md-5">
        <div class="row justify-content-center">
            <div class="col-xl-11">

                <div class="card main-booking-card rounded-4 border-1">
                    <div class="card-body p-3 p-md-5">

                        <!-- HEADER -->
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-start mb-4 mb-md-5 gap-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="position-relative">
                                    <div class="radar-ping"></div>
                                    <div class="bg-dark p-3 rounded-4 text-white position-relative">
                                        <i class="fa-solid fa-truck-ramp-box fs-4"></i>
                                    </div>
                                </div>
                                <div>
                                    <h3 class="fw-900 text-navy mb-0 fs-4">Service Deployment</h3>
                                    <p class="text-muted extra-small fw-bold mb-0">CLIENT_NODE: {{ current_user.company_name }}</p>
                                </div>
                            </div>
                            <div>
                                <span class="badge bg-light text-success border px-3 py-2 rounded-pill fw-900" style="font-size: 0.6rem;">
                                    <i class="fa-solid fa-circle-check me-1"></i> MANIFEST_SECURE
                                </span>
                            </div>
                        </div>

                        <!-- 2. DYNAMIC MANIFEST -->
                        <div id="manifestWrapper" class="d-none animate__animated animate__fadeIn">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-900 text-navy mb-0"><i class="fa-solid fa-list-check me-2"></i>Manifest</h6>
                                <span class="badge bg-dark px-3" id="manifestCount">0 Assets</span>
                            </div>

                            <!-- DESKTOP TABLE -->
                            <div class="table-responsive manifest-table manifest-table-container mb-4 d-none d-md-block">
                                <table class="table align-middle mb-0">
                                    <thead>
                                        <tr>
                                            <th class="ps-4">Asset Identification</th>
                                            <th>Hub</th>
                                            <th>Mode</th>
                                            <th>Service</th>
                                            <th>Schedule</th>
                                            <th class="text-end pe-4">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="manifestBody" class="fw-bold text-navy" style="font-size: 0.85rem;"></tbody>
                                </table>
                            </div>

                            <!-- MOBILE CARDS (Injects here) -->
                            <div id="manifestCards" class="manifest-cards d-none"></div>

                            <form action="/book" method="POST" id="finalSubmitForm">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <input type="hidden" name="manifest_data" id="manifestJsonInput">
                                <button type="submit" class="btn btn-success w-100 py-3 rounded-3 fw-900 text-uppercase shadow-sm">
                                    CONFIRM GLOBAL DEPLOYMENT <i class="fa-solid fa-paper-plane ms-2"></i>
                                </button>
                            </form>
                            <hr class="my-4 my-md-5 opacity-10">
                        </div>

                        <!-- 3. DEPLOYMENT FORM -->
                        <div class="row g-4 g-md-5">
                            <!-- IDENTIFICATION -->
                            <div class="col-lg-6">
                                <div class="d-flex align-items-center mb-4">
                                    <div class="step-hex me-3">01</div>
                                    <h6 class="fw-900 text-navy mb-0 text-uppercase">Asset ID</h6>
                                </div>

                                <div class="mb-4">
                                    <label class="biz-label">Registered Fleet</label>
                                    <div class="biz-input-group">
                                        <select id="vSelect" class="form-select biz-select">
                                            <option value="" disabled selected>Select asset...</option>
                                            {% for v in vehicles %}
                                                <option value="{{ v.id }}" data-plate="{{ v.plate_number }}">
                                                    {{ v.plate_number }} ({{ v.model_description }})
                                                </option>
                                            {% endfor %}
                                            <option value="new" class="text-primary fw-bold">+ Provision New Asset</option>
                                        </select>
                                    </div>
                                </div>

                                <div id="newVehicleFields" class="d-none animate__animated animate__fadeIn p-3 rounded-4 bg-light border border-primary border-dashed mb-4">
                                    <div class="mb-3">
                                        <label class="biz-label">New Plate Number</label>
                                        <input type="text" id="newPlate" class="form-control biz-input bg-white border px-3" placeholder="ABC-1234">
                                    </div>
                                    <div>
                                        <label class="biz-label">Asset Description</label>
                                        <input type="text" id="newModel" class="form-control biz-input bg-white border px-3" placeholder="e.g. Isuzu HI-ACE">
                                    </div>
                                </div>
                            </div>

                            <!-- LOGIC -->
                            <div class="col-lg-6">
                                <div class="d-flex align-items-center mb-4">
                                    <div class="step-hex me-3">02</div>
                                    <h6 class="fw-900 text-navy mb-0 text-uppercase">Deployment Logic</h6>
                                </div>

                                <div class="mb-4">
                                    <label class="biz-label">Operational Mode</label>
                                    <div class="d-flex gap-2">
                                        <input type="radio" class="btn-check" name="service_location" id="locIn" value="In-Plant" checked>
                                        <label class="btn btn-outline-primary flex-fill fw-bold py-3 rounded-3" for="locIn">In-Plant</label>

                                        <input type="radio" class="btn-check" name="service_location" id="locOut" value="Out-Plant">
                                        <label class="btn btn-outline-primary flex-fill fw-bold py-3 rounded-3" for="locOut">Out-Plant</label>
                                    </div>
                                </div>

                                <div class="row g-2 mb-3">
                                    <div class="col-6">
                                        <label class="biz-label">Target Hub</label>
                                        <select id="locSelect" class="form-select biz-input border px-3" style="height: 52px;">
                                            <option value="" disabled selected>Hub...</option>
                                            {% for loc in locations %}
                                                <option value="{{ loc.id }}">{{ loc.name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-6">
                                        <label class="biz-label">Service Node</label>
                                        <select id="prodSelect" class="form-select biz-input border px-3" style="height: 52px;">
                                            <option value="" disabled selected>Service...</option>
                                            {% for category in categories %}
                                                <option value="{{ category.name }}">{{ category.name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="biz-label">Date</label>
                                        <input type="text" id="datePicker" class="form-control biz-input border px-3 text-center bg-white" style="height: 52px;" placeholder="Select Date">
                                    </div>
                                    <div class="col-6">
                                        <label class="biz-label">Time</label>
                                        <input type="text" id="timePicker" class="form-control biz-input border px-3 text-center bg-white" style="height: 52px;" placeholder="Select Time">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 mt-md-5">
                            <button type="button" onclick="addToManifest()" class="btn btn-add-manifest shadow-sm">
                                <i class="fa-solid fa-circle-plus me-2"></i> ADD TO MANIFEST
                            </button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const datePicker = flatpickr("#datePicker", {
        minDate: "today", disable: [(date) => date.getDay() === 0],
        dateFormat: "F j, Y"
    });
    const timePicker = flatpickr("#timePicker", {
        enableTime: true, noCalendar: true, dateFormat: "h:i K",
        minTime: "08:00", maxTime: "17:00", minuteIncrement: 30
    });

    document.getElementById('vSelect').addEventListener('change', function() {
        document.getElementById('newVehicleFields').classList.toggle('d-none', this.value !== 'new');
    });

    let manifest = [];

    function addToManifest() {
        const vSelect = document.getElementById('vSelect');
        const locSelect = document.getElementById('locSelect');
        const prodSelect = document.getElementById('prodSelect');
        const modeInput = document.querySelector('input[name="service_location"]:checked');
        const dStr = datePicker.input.value;
        const tStr = timePicker.input.value;

        if (!vSelect.value || !locSelect.value || !prodSelect.value || !dStr || !tStr) {
            alert("Validation Error: All fields are required.");
            return;
        }

        let plateDisplay = vSelect.value === 'new' ?
            document.getElementById('newPlate').value.toUpperCase().trim() :
            vSelect.options[vSelect.selectedIndex].getAttribute('data-plate');

        const dObj = datePicker.selectedDates[0];
        const tObj = timePicker.selectedDates[0];
        const isoTime = `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}-${String(dObj.getDate()).padStart(2,'0')}T${String(tObj.getHours()).padStart(2,'0')}:${String(tObj.getMinutes()).padStart(2,'0')}`;

        const entry = {
            vehicle_id: vSelect.value,
            new_plate: document.getElementById('newPlate').value,
            new_model: document.getElementById('newModel').value,
            plate_display: plateDisplay,
            location_id: locSelect.value,
            location_name: locSelect.options[locSelect.selectedIndex].text,
            product: prodSelect.value,
            service_location: modeInput.value,
            time: isoTime,
            time_display: `${dStr} @ ${tStr}`
        };

        manifest.push(entry);
        renderManifest();

        vSelect.selectedIndex = 0;
        document.getElementById('newVehicleFields').classList.add('d-none');
        document.getElementById('newPlate').value = "";
        document.getElementById('newModel').value = "";
        document.getElementById('manifestWrapper').scrollIntoView({ behavior: 'smooth' });
    }

    function renderManifest() {
        const wrapper = document.getElementById('manifestWrapper');
        const body = document.getElementById('manifestBody');
        const cardContainer = document.getElementById('manifestCards');
        const countTag = document.getElementById('manifestCount');
        const jsonInput = document.getElementById('manifestJsonInput');

        body.innerHTML = "";
        cardContainer.innerHTML = "";

        manifest.forEach((item, index) => {
            // Table row for Desktop
            body.innerHTML += `
                <tr class="animate__animated animate__fadeIn">
                    <td class="ps-4"># ${item.plate_display}</td>
                    <td>${item.location_name}</td>
                    <td><span class="badge ${item.service_location === 'In-Plant' ? 'bg-info-subtle text-info' : 'bg-danger-subtle text-danger'}">${item.service_location}</span></td>
                    <td><span class="badge bg-light text-dark border">${item.product}</span></td>
                    <td class="text-muted extra-small">${item.time_display}</td>
                    <td class="text-end pe-4">
                        <button type="button" onclick="removeFromManifest(${index})" class="btn btn-sm text-danger"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>`;

            // Card for Mobile
            cardContainer.innerHTML += `
                <div class="manifest-card-item animate__animated animate__fadeInUp">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div class="fw-900 text-navy"># ${item.plate_display}</div>
                        <button type="button" onclick="removeFromManifest(${index})" class="btn btn-sm btn-outline-danger border-0 py-0"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="extra-small fw-bold text-muted text-uppercase mb-1">${item.location_name} // ${item.product}</div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge ${item.service_location === 'In-Plant' ? 'bg-info-subtle text-info' : 'bg-danger-subtle text-danger'}">${item.service_location}</span>
                        <div class="fw-bold text-navy" style="font-size: 0.7rem;">${item.time_display}</div>
                    </div>
                </div>`;
        });

        jsonInput.value = JSON.stringify(manifest);
        countTag.innerText = `${manifest.length} ASSETS READY`;
        wrapper.classList.toggle('d-none', manifest.length === 0);
    }

    function removeFromManifest(index) {
        manifest.splice(index, 1);
        renderManifest();
    }
</script>
{% endblock %}
