{% extends "base.html" %}
{% block content %}

<!-- EXTERNAL ASSETS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<div class="booking-terminal-wrapper d-flex align-items-center justify-content-center py-3 py-lg-5 animate__animated animate__fadeIn">
    <div class="container-fluid px-2 px-md-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <div class="card border-0 rounded-4 overflow-hidden shadow-2xl main-booking-card">

                    <!-- 1. TERMINAL HEADER -->
                    <div class="card-header bg-white p-3 p-md-5 border-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <div class="icon-scan-wrapper d-none d-sm-block">
                                    <div class="radar-ping"></div>
                                    <div class="bg-navy p-3 rounded-4 text-white position-relative shadow">
                                        <i class="fa-solid fa-calendar-check fs-4 text-white ani-pulse-icon"></i>
                                    </div>
                                </div>
                                <div>
                                    <h3 class="fw-900 text-navy mb-1 ls-tight fs-4 fs-md-2">Service Deployment</h3>
                                    <p class="text-muted small fw-600 mb-0 text-uppercase ls-1">
                                        <i class="fa-solid fa-network-wired text-primary me-1 ani-heartbeat"></i> Active Node Initialization
                                    </p>
                                </div>
                            </div>
                            <div class="terminal-status-tag">
                                <span class="pulse-dot-green"></span> SYSTEM_READY
                            </div>
                        </div>
                        <div class="header-divider mt-3 mt-md-4"></div>
                    </div>

                    <div class="card-body bg-white p-3 p-md-5 pt-0">
                        <form action="/book" method="POST" id="bookingForm">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <input type="hidden" name="time" id="finalDateTime">

                            <div class="row g-4 g-md-5">

                                <!-- COLUMN 01: ASSET ASSIGNMENT -->
                                <div class="col-12 col-md-6 border-end-md">
                                    <div class="d-flex align-items-center mb-4">
                                        <div class="step-hex me-2 me-md-3">01</div>
                                        <h6 class="biz-label mb-0">Asset Identification</h6>
                                    </div>

                                    <div class="mb-4">
                                        <label class="biz-label">Fleet Registry Search</label>
                                        <div class="biz-input-group border">
                                            <span class="input-icon"><i class="fa-solid fa-truck-container text-primary ani-float"></i></span>
                                            <select name="vehicle_id" id="vSelect" class="form-select biz-select border-0" required>
                                                <option value="" disabled selected>Select asset...</option>
                                                {% for v in vehicles %}
                                                    <option value="{{ v.id }}" data-plate="{{ v.plate_number }} ({{ v.model_description }})">
                                                        {{ v.plate_number }} ({{ v.model_description }})
                                                    </option>
                                                {% endfor %}
                                                <option value="new" class="text-primary fw-bold">+ Provision New Asset Node</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- NEW ASSET BOX (CLEAR ON SIGHT) -->
                                    <div id="newVehicleFields" class="d-none animate__animated animate__fadeIn p-4 rounded-4 bg-white border border-primary border-2 shadow-sm mb-3">
                                        <div class="mb-3">
                                            <label class="biz-label text-primary">Plate Identification</label>
                                            <div class="biz-input-group border bg-light">
                                                <span class="input-icon"><i class="fa-solid fa-id-card-clip text-primary"></i></span>
                                                <input type="text" name="new_plate" id="newPlate" class="form-control biz-input" placeholder="ABC-1234">
                                            </div>
                                        </div>
                                        <div>
                                            <label class="biz-label text-primary">Asset Model / Type</label>
                                            <div class="biz-input-group border bg-light">
                                                <span class="input-icon"><i class="fa-solid fa-tags text-primary"></i></span>
                                                <input type="text" name="new_model" id="newModel" class="form-control biz-input" placeholder="e.g. Isuzu HI-ACE">
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- COLUMN 02: HUB & SERVICES -->
                                <div class="col-12 col-md-6">
                                    <div class="d-flex align-items-center mb-4">
                                        <div class="step-hex me-2 me-md-3">02</div>
                                        <h6 class="biz-label mb-0">Hub & Service Logic</h6>
                                    </div>

                                    <div class="mb-3">
                                        <label class="biz-label">Service Hub (Location)</label>
                                        <div class="biz-input-group border">
                                            <span class="input-icon"><i class="fa-solid fa-location-crosshairs text-primary ani-pulse-icon"></i></span>
                                            <select name="location_id" id="locSelect" class="form-select biz-select border-0" required>
                                                <option value="" disabled selected>Select terminal...</option>
                                                {% for loc in locations %}
                                                    <option value="{{ loc.id }}">{{ loc.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="biz-label">Services:</label>
                                        <div class="biz-input-group border">
                                            <span class="input-icon"><i class="fa-solid fa-screwdriver-wrench text-primary gear-spin"></i></span>
                                            <select name="product" id="prodSelect" class="form-select biz-select border-0" required>
                                                <option value="" disabled selected>Select service type...</option>
                                                {% for category in categories %}
                                                    <option value="{{ category.name }}">{{ category.name }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row g-3">
                                        <div class="col-6">
                                            <label class="biz-label">Target Date</label>
                                            <div class="biz-input-group border bg-light">
                                                <input type="text" id="datePicker" class="form-control biz-input text-center" placeholder="SET DATE" readonly required>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <label class="biz-label">Time Window</label>
                                            <div class="biz-input-group border bg-light">
                                                <input type="text" id="timePicker" class="form-control biz-input text-center" placeholder="SET TIME" readonly required>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- INTERACTIVE DIGITAL TICKET -->
                            <div id="bookingSummary" class="d-none animate__animated animate__fadeInUp mt-4 mt-md-5">
                                <div class="summary-ticket p-3 p-md-4 rounded-4 border-0 text-white shadow-lg">
                                    <div class="row align-items-center">
                                        <div class="col-12 col-md-8 text-center text-md-start">
                                            <div class="d-flex align-items-center justify-content-center justify-content-md-start gap-2 mb-2">
                                                <i class="fa-solid fa-ticket-simple text-warning fs-4 ani-heartbeat"></i>
                                                <h6 class="fw-800 extra-small text-uppercase ls-1 text-warning mb-0">Configuration Validated</h6>
                                            </div>
                                            <p id="summaryText" class="mb-0 small fw-500 font-monospace text-uppercase ls-1"></p>
                                        </div>
                                        <div class="col-12 col-md-4 mt-3 mt-md-0">
                                            <button type="submit" class="btn btn-confirm-final w-100 py-3 rounded-3 shadow hover-lift">
                                                INITIALIZE <i class="fa-solid fa-check-double ms-1"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 mt-md-5" id="mainSubmitContainer">
                                <button type="button" class="btn btn-navy-submit w-100 py-3 py-md-4 rounded-3 shadow-lg opacity-50" disabled>
                                    INITIALIZING PARAMETERS...
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --coolaire-navy: #002d72;
        --coolaire-green: #22c55e;
        --coolaire-yellow: #ffc107;
    }

    .booking-terminal-wrapper { min-height: calc(100vh - 120px); }
    .text-navy { color: var(--coolaire-navy); }
    .fw-900 { font-weight: 900; }
    .ls-tight { letter-spacing: -1.5px; }
    .ls-1 { letter-spacing: 1px; }
    .extra-small { font-size: 0.65rem; }
    .biz-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 8px; display: block; }

    .main-booking-card { border-radius: 1.5rem !important; box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.15); }
    .header-divider { height: 1px; background: linear-gradient(to right, #e2e8f0, transparent); }

    .step-hex { background: var(--coolaire-navy); color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; border-radius: 8px; }

    .biz-input-group { display: flex; align-items: center; background: #f8fafc; border-radius: 12px; padding: 4px 15px; transition: 0.3s; }
    .biz-input-group:focus-within { background: white; border-color: var(--coolaire-navy) !important; box-shadow: 0 0 0 4px rgba(0,45,114,0.05); }
    .input-icon { width: 25px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 1.1rem; }
    .input-icon i { color: var(--coolaire-navy) !important; } /* FORCE ICON VISIBILITY */

    .biz-select, .biz-input { background: transparent !important; border: none !important; box-shadow: none !important; padding: 12px 0; font-weight: 700; color: #1e293b; font-size: 0.9rem; width: 100%; }

    .summary-ticket { background: linear-gradient(135deg, var(--coolaire-navy) 0%, #001d4a 100%); border-left: 6px solid var(--coolaire-yellow) !important; }

    .btn-navy-submit { background: var(--coolaire-navy); color: white !important; font-weight: 800; border: none; transition: 0.3s; }
    .btn-confirm-final { background-color: var(--coolaire-yellow); color: #000 !important; font-weight: 900; border: none; transition: 0.3s; }
    .btn-confirm-final:hover { background-color: #eab308; transform: translateY(-2px); }

    /* ANIMATIONS */
    .icon-scan-wrapper { position: relative; }
    .radar-ping { position: absolute; inset: 0; border: 2px solid var(--coolaire-navy); border-radius: 1rem; animation: radar-expand 2s infinite; }
    @keyframes radar-expand { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }

    .ani-float { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .gear-spin { animation: fa-spin 6s linear infinite; }
    .ani-heartbeat { animation: heartbeat 1.5s ease-in-out infinite; }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .ani-pulse-icon { animation: pulse-icon 2s infinite; }
    @keyframes pulse-icon { 0%, 100% { transform: scale(1); } 50% { transform: opacity 0.5; } }

    .terminal-status-tag { background: #f0fdf4; padding: 6px 15px; border-radius: 50px; font-size: 0.6rem; font-weight: 900; color: #166534; border: 1px solid #dcfce7; }

    @media (max-width: 768px) {
        .border-end-md { border-right: none !important; border-bottom: 1px solid #f1f5f9; padding-bottom: 2rem; margin-bottom: 1rem; }
        .biz-input { font-size: 0.85rem; }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const datePicker = flatpickr("#datePicker", {
        minDate: "today", disable: [(date) => date.getDay() === 0],
        dateFormat: "F j, Y", onChange: updateSummary
    });
    const timePicker = flatpickr("#timePicker", {
        enableTime: true, noCalendar: true, dateFormat: "h:i K",
        minTime: "08:00", maxTime: "17:00", minuteIncrement: 30, onChange: updateSummary
    });

    document.getElementById('vSelect').addEventListener('change', function() {
        document.getElementById('newVehicleFields').classList.toggle('d-none', this.value !== 'new');
        updateSummary();
    });
    document.getElementById('locSelect').addEventListener('change', updateSummary);
    document.getElementById('prodSelect').addEventListener('change', updateSummary);
    document.getElementById('newPlate').addEventListener('input', updateSummary);
    document.getElementById('newModel').addEventListener('input', updateSummary);

    function updateSummary() {
        const vSelect = document.getElementById('vSelect');
        const locSelect = document.getElementById('locSelect');
        const prodSelect = document.getElementById('prodSelect');
        const d = datePicker.input.value;
        const t = timePicker.input.value;
        const finalInput = document.getElementById('finalDateTime');

        let plateStr = "";
        let branch = locSelect.selectedIndex > 0 ? locSelect.options[locSelect.selectedIndex].text : "";

        if (vSelect.value === 'new') {
            const p = document.getElementById('newPlate').value.trim().toUpperCase();
            const m = document.getElementById('newModel').value.trim().toUpperCase();
            plateStr = p + (m ? ` (${m})` : "");
        } else if (vSelect.selectedIndex > 0) {
            plateStr = vSelect.options[vSelect.selectedIndex].getAttribute('data-plate');
        }

        const summaryBox = document.getElementById('bookingSummary');
        const mainBtn = document.getElementById('mainSubmitContainer');

        if (d && t && plateStr && branch && prodSelect.value) {
            summaryBox.classList.remove('d-none');
            mainBtn.classList.add('d-none');
            document.getElementById('summaryText').innerText = `NODE:[${plateStr}] // HUB:${branch} // ARRIVAL:${d} @ ${t}`;

            const dObj = datePicker.selectedDates[0];
            const tObj = timePicker.selectedDates[0];
            if(dObj && tObj) {
                const isoStr = `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}-${String(dObj.getDate()).padStart(2,'0')}T${String(tObj.getHours()).padStart(2,'0')}:${String(tObj.getMinutes()).padStart(2,'0')}`;
                finalInput.value = isoStr;
            }
        } else {
            summaryBox.classList.add('d-none');
            mainBtn.classList.remove('d-none');
            finalInput.value = "";
        }
    }
</script>
{% endblock %}
