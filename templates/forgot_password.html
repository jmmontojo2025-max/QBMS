{% extends "base.html" %}

{% block content %}
<!-- Premium SaaS Font -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<style>
    :root {
        --saas-navy: #0f172a;
        --saas-blue: #2563eb;
        --saas-slate: #64748b;
        --saas-border: #e2e8f0;
        --saas-radius: 16px;
    }

    body {
        background-color: #ffffff !important;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--saas-navy);
        -webkit-font-smoothing: antialiased;
    }

    .auth-viewport {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    /* THE OUTSIDE LINE (BOX CONTAINER) */
    .recovery-container-box {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border: 1px solid var(--saas-border);
        border-radius: var(--saas-radius);
        padding: 3.5rem 2.5rem;
        transition: all 0.3s ease;
    }

    /* BRAND ICON */
    .brand-mark {
        width: 48px;
        height: 48px;
        background: var(--saas-navy);
        color: #ffffff;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        margin-bottom: 2rem;
    }

    .page-title {
        font-weight: 800;
        font-size: 1.8rem;
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
    }

    .page-subtitle {
        color: var(--saas-slate);
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 3rem;
        line-height: 1.5;
    }

    /* MODERN TEXTBOX UI */
    .field-wrapper {
        margin-bottom: 2rem;
    }

    .biz-label {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--saas-slate);
        margin-bottom: 0.8rem;
        display: block;
    }

    .modern-textbox {
        display: flex;
        align-items: center;
        background: #f8fafc;
        border: 1.5px solid var(--saas-border);
        border-radius: 12px;
        padding: 0.8rem 1.1rem;
        transition: all 0.2s ease;
    }

    .modern-textbox:focus-within {
        background: #ffffff;
        border-color: var(--saas-navy);
        box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
    }

    .modern-textbox i {
        color: #94a3b8;
        margin-right: 12px;
        font-size: 0.9rem;
    }

    .modern-textbox input {
        border: none;
        background: transparent !important;
        width: 100%;
        font-weight: 700;
        color: var(--saas-navy);
        font-size: 0.95rem;
    }

    .modern-textbox input:focus {
        outline: none;
    }

    /* ACTION BUTTON (PILL) */
    .btn-recovery-cta {
        background: var(--saas-navy);
        color: #ffffff;
        width: 100%;
        padding: 1.1rem;
        border-radius: 50px;
        font-weight: 800;
        border: none;
        margin-top: 1rem;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.85rem;
    }

    .btn-recovery-cta:hover {
        background: var(--saas-blue);
        transform: translateY(-2px);
    }

    /* FOOTER LINK */
    .back-to-login {
        margin-top: 2.5rem;
        text-align: center;
    }

    .login-link {
        color: var(--saas-slate);
        text-decoration: none;
        font-weight: 700;
        font-size: 0.85rem;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .login-link:hover { color: var(--saas-navy); }

    @media (max-width: 576px) {
        .recovery-container-box {
            padding: 2.5rem 1.5rem;
            border: none;
        }
    }
</style>

<div class="auth-viewport">

    <div class="recovery-container-box animate__animated animate__fadeIn">

        <!-- ICON -->
        <div class="brand-mark shadow-sm">
            <i class="fa-solid fa-key"></i>
        </div>

        <h1 class="page-title">Reset Access</h1>
        <p class="page-subtitle">Enter your registered email and we'll send a secure link to reset your password.</p>

        <!-- RECOVERY FORM -->
        <form action="/forgot-password" method="POST" id="recoveryForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field-wrapper">
                <label class="biz-label">Corporate Email</label>
                <div class="modern-textbox">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="name@company.com" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn-recovery-cta shadow-sm" id="submitBtn">
                Send Recovery Link
            </button>

            <div class="back-to-login">
                <a href="/login" class="login-link">
                    <i class="fa-solid fa-arrow-left-long"></i>
                    <span>Back to Portal Sign-in</span>
                </a>
            </div>
        </form>

    </div>

</div>

<script>
    // PREVENT DOUBLE SUBMISSION
    document.getElementById('recoveryForm').addEventListener('submit', function() {
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> PROCESSING...';
        btn.classList.add('disabled');
    });
</script>
{% endblock %}
