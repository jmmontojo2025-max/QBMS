{% extends "base.html" %}

{% block content %}
<!-- GOOGLE FONTS: Source Sans 3 -->
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

<div class="sn-portal-wrapper">

    <!-- MAIN CONTENT -->
    <div class="container d-flex flex-column align-items-center justify-content-center" style="flex: 1; padding-bottom: 100px;">

        <div class="sn-card col-12 col-sm-8 col-md-6 col-lg-4">
            <!-- WIDGET HEADER -->
            <div class="sn-card-header">
                <h1 class="sn-card-title">Staff Terminal</h1>
                <p class="sn-card-subtitle">Internal Access: Operator Credentials Required</p>
            </div>

            <div class="sn-card-body">
                <form action="/staff/login" method="POST" id="staffLoginForm" autocomplete="off">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- INPUT GROUP -->
                    <div class="sn-form-group">
                        <label class="sn-label">Operator ID / Username</label>
                        <input type="text" name="username" class="sn-input" placeholder="Enter ID" required autofocus>
                    </div>

                    <!-- INPUT GROUP -->
                    <div class="sn-form-group">
                        <div class="d-flex justify-content-between">
                            <label class="sn-label">Password</label>
                            <a href="#" class="sn-link-sm">Reset Credentials</a>
                        </div>
                        <div class="sn-input-container">
                            <input type="password" name="password" id="staffPassword" class="sn-input" placeholder="••••••••" required>
                            <button type="button" class="sn-eye-btn" onclick="toggleStaffPass()">
                                <i class="fa-solid fa-eye-slash" id="staffEyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-sn-primary" id="staffSubmitBtn">
                        Initialize Terminal
                    </button>

                    <div class="sn-divider">
                        <span>OR</span>
                    </div>

                    <a href="/login" class="btn-sn-secondary text-center">
                        Exit to Client Portal
                    </a>
                </form>
            </div>
        </div>

        <!-- DISCREET INFO -->
        <div class="mt-4">
            <div class="sn-admin-badge">
                <i class="fa-solid fa-shield-halved me-1"></i> Secure Staff Environment
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="sn-footer">
        <div>&copy; 2024 Coolaire Fleet Management</div>
        <div class="d-none d-md-block">System Node: STAFF-01-NAVY</div>
    </footer>
</div>

<style>
    :root {
        /* DARK NAVY BLUE INTERNAL THEME */
        --sn-primary: #002d72;      /* Coolaire Navy */
        --sn-primary-hover: #001f4d;
        --sn-bg: #f0f3f4;
        --sn-card-bg: #ffffff;
        --sn-text-main: #1e293b;
        --sn-text-muted: #64748b;
        --sn-border: #cbd5e1;
        --sn-input-focus: #002d72;
    }

    body, html {
        height: 100%;
        margin: 0;
        background-color: var(--sn-bg) !important;
        font-family: 'Source Sans 3', sans-serif !important;
        color: var(--sn-text-main);
    }

    .sn-portal-wrapper {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* THE CARD */
    .sn-card {
        background: var(--sn-card-bg);
        border: 1px solid var(--sn-border);
        border-radius: 2px; /* Sharper edges for "Internal" feel */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        margin-top: 50px;
    }

    .sn-card-header {
        padding: 30px 30px 10px 30px;
        border-top: 4px solid var(--sn-primary); /* Navy Indicator */
    }

    .sn-card-title {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--sn-primary); /* Navy Title */
        margin-bottom: 8px;
    }

    .sn-card-subtitle {
        font-size: 0.85rem;
        color: var(--sn-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .sn-card-body {
        padding: 0 30px 30px 30px;
    }

    /* FORM ELEMENTS */
    .sn-form-group {
        margin-bottom: 20px;
    }

    .sn-label {
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 6px;
        color: var(--sn-text-main);
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    .sn-input-container {
        display: flex;
        position: relative;
    }

    .sn-input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--sn-border);
        border-radius: 3px;
        font-size: 0.95rem;
        transition: all 0.2s;
        background-color: #fafafa;
    }

    .sn-input:focus {
        outline: none;
        border-color: var(--sn-input-focus);
        box-shadow: 0 0 0 1px var(--sn-input-focus);
        background-color: #fff;
    }

    .sn-eye-btn {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: none;
        color: var(--sn-text-muted);
        cursor: pointer;
    }

    /* BUTTONS - DARK NAVY BLUE */
    .btn-sn-primary {
        width: 100%;
        background-color: var(--sn-primary) !important;
        color: white !important;
        border: none;
        padding: 12px;
        border-radius: 3px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-sn-primary:hover {
        background-color: var(--sn-primary-hover) !important;
    }

    .btn-sn-secondary {
        display: block;
        width: 100%;
        background-color: transparent;
        color: var(--sn-primary) !important;
        border: 1px solid var(--sn-primary) !important;
        padding: 10px;
        border-radius: 3px;
        font-weight: 700;
        text-decoration: none;
        font-size: 0.85rem;
        text-transform: uppercase;
        transition: 0.2s;
    }

    .btn-sn-secondary:hover {
        background-color: #f0f4f8;
        color: var(--sn-primary-hover) !important;
        border-color: var(--sn-primary-hover) !important;
    }

    .sn-divider {
        text-align: center;
        margin: 20px 0;
        position: relative;
    }

    .sn-divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 1px;
        background: var(--sn-border);
        z-index: 1;
    }

    .sn-divider span {
        background: white;
        padding: 0 15px;
        position: relative;
        z-index: 2;
        color: var(--sn-text-muted);
        font-size: 0.75rem;
        font-weight: 700;
    }

    .sn-link-sm {
        font-size: 0.8rem;
        color: var(--sn-primary);
        text-decoration: none;
        font-weight: 700;
    }

    .sn-link-sm:hover {
        text-decoration: underline;
    }

    /* FOOTER */
    .sn-footer {
        height: 60px;
        border-top: 1px solid var(--sn-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 40px;
        font-size: 0.75rem;
        color: var(--sn-text-muted);
        background: #fff;
    }

    .sn-admin-badge {
        font-size: 0.75rem;
        color: var(--sn-primary);
        background: #e2e8f0;
        padding: 4px 12px;
        border-radius: 4px;
        font-weight: 800;
        text-transform: uppercase;
        border: 1px solid var(--sn-border);
    }

</style>

<script>
    document.getElementById('staffLoginForm').addEventListener('submit', function() {
        const btn = document.getElementById('staffSubmitBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> INITIALIZING...';
        btn.disabled = true;
    });

    function toggleStaffPass() {
        const passInput = document.getElementById('staffPassword');
        const eyeIcon = document.getElementById('staffEyeIcon');
        if (passInput.type === "password") {
            passInput.type = "text";
            eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            passInput.type = "password";
            eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    }
</script>
{% endblock %}
